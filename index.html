<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapterhorn Hillshade</title>
    <link
      href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      #info {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        z-index: 2;
        display: none;
        min-width: min(92vw, 28rem);
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background: rgba(18, 22, 28, 0.92);
        color: #f5f7fa;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        font-size: 0.95rem;
        line-height: 1.4;
      }

      #info.visible {
        display: block;
      }

      #info .label {
        color: #9aa4b2;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      #info .value {
        font-variant-numeric: tabular-nums;
      }

      #info .row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      @media (max-width: 640px) {
        #info .row {
          grid-template-columns: 1fr;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="info" aria-live="polite">
      <div class="row">
        <div>
          <div class="label">Latitude</div>
          <div class="value" id="lat">—</div>
        </div>
        <div>
          <div class="label">Longitude</div>
          <div class="value" id="lng">—</div>
        </div>
        <div>
          <div class="label">Elevation</div>
          <div class="value" id="elevation">—</div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script>
      const info = document.getElementById("info");
      const latEl = document.getElementById("lat");
      const lngEl = document.getElementById("lng");
      const elevationEl = document.getElementById("elevation");

      const tileCache = new Map();

      function formatCoord(value, isLat) {
        const abs = Math.abs(value).toFixed(5);
        const dir = isLat ? (value >= 0 ? "N" : "S") : value >= 0 ? "E" : "W";
        return `${abs}° ${dir}`;
      }

      function lngLatToTile(lng, lat, zoom) {
        const scale = 2 ** zoom;
        const x = Math.floor(((lng + 180) / 360) * scale);
        const latRad = (lat * Math.PI) / 180;
        const y = Math.floor(
          ((1 -
            Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) /
            2) *
            scale
        );
        return { x, y, zoom };
      }

      function pixelInTile(lng, lat, zoom, tileX, tileY, tileSize) {
        const scale = 2 ** zoom;
        const xFrac = ((lng + 180) / 360) * scale - tileX;
        const latRad = (lat * Math.PI) / 180;
        const yFrac =
          ((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) /
            2) *
            scale -
          tileY;
        return {
          px: Math.min(tileSize - 1, Math.max(0, Math.floor(xFrac * tileSize))),
          py: Math.min(tileSize - 1, Math.max(0, Math.floor(yFrac * tileSize))),
        };
      }

      function terrariumElevation(r, g, b) {
        return r * 256 + g + b / 256 - 32768;
      }

      async function getTileImageData(z, x, y) {
        const key = `${z}/${x}/${y}`;
        if (tileCache.has(key)) {
          return tileCache.get(key);
        }

        const response = await fetch(`https://tiles.mapterhorn.com/${key}.webp`);
        if (!response.ok) {
          throw new Error("Could not load elevation tile");
        }

        const bitmap = await createImageBitmap(await response.blob());
        const canvas = document.createElement("canvas");
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(bitmap, 0, 0);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const payload = { width: canvas.width, height: canvas.height, imageData };
        tileCache.set(key, payload);
        return payload;
      }

      async function queryElevation(lng, lat, zoom) {
        const tileZoom = Math.max(0, Math.min(12, Math.round(zoom)));
        const { x, y } = lngLatToTile(lng, lat, tileZoom);
        const tile = await getTileImageData(tileZoom, x, y);
        const { px, py } = pixelInTile(lng, lat, tileZoom, x, y, tile.width);
        const index = (py * tile.width + px) * 4;
        const data = tile.imageData.data;
        return terrariumElevation(data[index], data[index + 1], data[index + 2]);
      }

      const map = new maplibregl.Map({
        container: "map",
        hash: "map",
        zoom: 10.5,
        center: [9.0788, 47.1194],
        style: {
          version: 8,
          sources: {
            hillshadeSource: {
              type: "raster-dem",
              url: "https://tiles.mapterhorn.com/tilejson.json",
              encoding: "terrarium",
              tileSize: 512,
            },
          },
          layers: [
            {
              id: "hillshade",
              type: "hillshade",
              source: "hillshadeSource",
              paint: {
                "hillshade-shadow-color": "#473b24",
                "hillshade-highlight-color": "#ffffff",
                "hillshade-accent-color": "#5c4a2f",
                "hillshade-exaggeration": 0.5,
              },
            },
          ],
        },
      });

      map.addControl(new maplibregl.NavigationControl(), "top-right");

      map.on("click", async (event) => {
        const { lng, lat } = event.lngLat;

        info.classList.add("visible");
        latEl.textContent = formatCoord(lat, true);
        lngEl.textContent = formatCoord(lng, false);
        elevationEl.textContent = "Loading…";

        try {
          const elevation = await queryElevation(lng, lat, map.getZoom());
          elevationEl.textContent = `${Math.round(elevation)} m`;
        } catch (error) {
          elevationEl.textContent = "Unavailable";
          console.error(error);
        }
      });
    </script>
  </body>
</html>
