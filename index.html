<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapterhorn Glide Cone</title>
    <link
      href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      #params-panel {
        position: fixed;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        border-radius: 0.75rem;
        background: rgba(18, 22, 28, 0.92);
        color: #f5f7fa;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        font-size: 0.85rem;
        max-width: min(96vw, 42rem);
      }

      #params-panel > summary {
        list-style: none;
        cursor: pointer;
        padding: 0.5rem 0.75rem;
        color: #c8d3e0;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        user-select: none;
      }

      #params-panel > summary::-webkit-details-marker {
        display: none;
      }

      #params-panel > summary::after {
        content: " ▸";
        float: right;
        opacity: 0.7;
      }

      #params-panel[open] > summary::after {
        content: " ▾";
      }

      #airports-panel {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 3;
        border-radius: 0.75rem;
        background: rgba(18, 22, 28, 0.92);
        color: #f5f7fa;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        font-size: 0.85rem;
        max-width: min(92vw, 16rem);
      }

      #airports-panel > summary {
        list-style: none;
        cursor: pointer;
        padding: 0.5rem 0.75rem;
        color: #c8d3e0;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        user-select: none;
      }

      #airports-panel > summary::-webkit-details-marker {
        display: none;
      }

      #airports-panel > summary::after {
        content: " ▸";
        float: right;
        opacity: 0.7;
      }

      #airports-panel[open] > summary::after {
        content: " ▾";
      }

      #airports-import {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        padding: 0 0.75rem 0.65rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      #airports-countries {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.2rem 0.5rem;
        max-height: 14rem;
        overflow: auto;
        padding-right: 0.15rem;
      }

      .airport-country {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        color: #d8dee9;
        font-size: 0.78rem;
        cursor: pointer;
        user-select: none;
      }

      .airport-country input {
        width: 0.95rem;
        height: 0.95rem;
        margin: 0;
        accent-color: #5a9fff;
      }

      #airports-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }

      #airports-actions button {
        flex: 1 1 auto;
        padding: 0.38rem 0.55rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.4rem;
        background: rgba(255, 255, 255, 0.06);
        color: #e8f0ff;
        font-size: 0.76rem;
        cursor: pointer;
      }

      #airports-actions button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.12);
      }

      #airports-actions button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      #airports-load {
        border-color: rgba(90, 159, 255, 0.45);
        background: rgba(90, 159, 255, 0.16);
      }

      #airports-attribution {
        color: #8b96a8;
        font-size: 0.68rem;
        line-height: 1.3;
      }

      #airports-attribution a {
        color: #9eb8e8;
      }

      #params {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 0.65rem 1rem;
        padding: 0 0.85rem 0.65rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      #params label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        color: #9aa4b2;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      #params input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin: 0.2rem 0 0;
        accent-color: #5a9fff;
      }

      #params label.checkbox-row {
        flex-direction: row;
        align-items: center;
        gap: 0.45rem;
        text-transform: none;
        letter-spacing: normal;
        font-size: 0.82rem;
        color: #d8dee9;
        padding-top: 1.1rem;
      }

      #params input {
        width: 5.5rem;
        padding: 0.35rem 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 0.4rem;
        background: rgba(255, 255, 255, 0.06);
        color: #f5f7fa;
        font-size: 0.9rem;
        font-variant-numeric: tabular-nums;
      }

      #params input:focus {
        outline: 2px solid rgba(100, 160, 255, 0.55);
        border-color: transparent;
      }

      #params select {
        min-width: 9.5rem;
        padding: 0.35rem 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 0.4rem;
        background: rgba(255, 255, 255, 0.06);
        color: #f5f7fa;
        font-size: 0.82rem;
      }

      #params select:focus {
        outline: 2px solid rgba(100, 160, 255, 0.55);
        border-color: transparent;
      }

      #params button {
        padding: 0.45rem 0.75rem;
        border: 1px solid rgba(255, 120, 120, 0.45);
        border-radius: 0.4rem;
        background: rgba(255, 80, 80, 0.14);
        color: #ffd6d6;
        font-size: 0.82rem;
        cursor: pointer;
        white-space: nowrap;
      }

      #params button:hover:not(:disabled) {
        background: rgba(255, 80, 80, 0.24);
      }

      #run-compute {
        border-color: rgba(90, 159, 255, 0.55);
        background: rgba(90, 159, 255, 0.2);
        color: #d8e8ff;
      }

      #run-compute:hover:not(:disabled) {
        background: rgba(90, 159, 255, 0.32);
      }

      #clear-seeds {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: #d8dee9;
      }

      #params button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      #params button[hidden] {
        display: none;
      }

      #stop-compute {
        margin-left: auto;
        padding: 0.35rem 0.65rem;
        border: 1px solid rgba(255, 140, 80, 0.55);
        border-radius: 0.4rem;
        background: rgba(255, 120, 60, 0.18);
        color: #ffe0cc;
        font-size: 0.82rem;
        cursor: pointer;
        white-space: nowrap;
      }

      #stop-compute:hover:not(:disabled) {
        background: rgba(255, 120, 60, 0.3);
      }

      #stop-compute:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      #stop-compute[hidden] {
        display: none;
      }

      #hover-tip {
        position: fixed;
        z-index: 4;
        display: none;
        pointer-events: none;
        padding: 0.3rem 0.55rem;
        border-radius: 0.4rem;
        background: rgba(18, 22, 28, 0.94);
        color: #e8f0ff;
        font-size: 0.82rem;
        font-variant-numeric: tabular-nums;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        white-space: pre-line;
        line-height: 1.35;
      }

      #hover-tip .delta-pos {
        color: #6dd96d;
      }

      #hover-tip .delta-neg {
        color: #f07070;
      }

      #info {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        z-index: 2;
        display: none;
        min-width: min(92vw, 36rem);
        padding: 0.55rem 0.75rem;
        border-radius: 0.75rem;
        background: rgba(18, 22, 28, 0.92);
        color: #f5f7fa;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      #info.visible {
        display: block;
      }

      #info .label {
        color: #9aa4b2;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      #info .value {
        font-variant-numeric: tabular-nums;
      }

      #info .row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.35rem 0.85rem;
        margin-bottom: 0.45rem;
      }

      #info .row .field {
        display: inline-flex;
        align-items: baseline;
        gap: 0.3rem;
        white-space: nowrap;
      }

      #info .row.path-meta {
        color: #d4deea;
        font-size: 0.78rem;
        margin-bottom: 0.4rem;
      }

      #info .row.path-meta[hidden] {
        display: none;
      }

      #path-stop {
        color: #ffb4b4;
        font-size: 0.76rem;
      }

      #path-stop[hidden] {
        display: none;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 0.4rem;
      }

      #status {
        color: #b8c5d6;
        font-size: 0.8rem;
        flex: 1;
        min-width: 0;
      }

      @media (max-width: 640px) {
        #info .row {
          gap: 0.3rem 0.55rem;
        }
      }
    </style>
  </head>
  <body>
    <details id="airports-panel">
      <summary>Airports</summary>
      <div id="airports-import">
        <div id="airports-countries" aria-label="Countries"></div>
        <div id="airports-actions">
          <button type="button" id="airports-select-all">All</button>
          <button type="button" id="airports-select-none">None</button>
          <button type="button" id="airports-load">Load</button>
          <button type="button" id="airports-clear">Clear</button>
        </div>
        <div id="airports-attribution">
          Data from <a href="https://www.openaip.net" target="_blank" rel="noopener">OpenAIP</a>
        </div>
      </div>
    </details>
    <details id="params-panel">
      <summary>Parameters</summary>
      <form id="params" aria-label="Glide parameters">
        <label>
          L/D
          <input id="ld" type="number" min="1" step="1" value="20" />
        </label>
        <label>
          Circuit height (m)
          <input id="circuit" type="number" min="0" step="10" value="250" />
        </label>
        <label>
          Ground clearance (m)
          <input id="clearance" type="number" min="0" step="10" value="100" />
        </label>
        <label>
          Max altitude (m)
          <input
            id="max-alt"
            type="number"
            min="1"
            step="50"
            value="4050"
            title="Glide radius per seed = max altitude × L/D"
          />
        </label>
        <label>
          Max window (px)
          <input
            id="max-window"
            type="number"
            min="64"
            step="64"
            value="1024"
            title="Max grid dimension; shrinks glide radius if seeds are far apart"
          />
        </label>
        <label>
          LOS run N
          <input id="los-run" type="number" min="0" step="1" value="0" title="0 = full Bresenham" />
        </label>
        <label>
          Update map (ms)
          <input
            id="update-map"
            type="number"
            min="0"
            step="50"
            value="100"
            title="0 = final frame only"
          />
        </label>
        <label class="checkbox-row">
          <input id="raw" type="checkbox" checked />
          Raw
        </label>
        <button type="button" id="run-compute" disabled>Run</button>
        <button type="button" id="clear-seeds">Clear seeds</button>
        <button type="button" id="compare-los" hidden>Full Bresenham (red)</button>
      </form>
    </details>
    <div id="hover-tip" aria-hidden="true"></div>
    <div id="map"></div>
    <div id="info" aria-live="polite">
      <div class="row">
        <span class="field">
          <span class="label">Lat</span>
          <span class="value" id="lat">—</span>
        </span>
        <span class="field">
          <span class="label">Lon</span>
          <span class="value" id="lng">—</span>
        </span>
        <span class="field">
          <span class="label">Elev</span>
          <span class="value" id="elevation">—</span>
        </span>
      </div>
      <div class="row path-meta" id="path-meta" hidden>
        <span class="field">
          <span class="label">Path</span>
          <span class="value" id="path-cell">—</span>
        </span>
        <span class="field">
          <span class="label">Orig</span>
          <span class="value" id="path-origin">—</span>
        </span>
        <span class="field" id="path-stop" hidden>stopped: loop</span>
      </div>
      <div class="row status-row">
        <div id="status">Loading WebGPU…</div>
        <button type="button" id="stop-compute" hidden>Stop</button>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
